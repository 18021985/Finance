[build]
  command = "cd frontend && npm install --legacy-peer-deps && npm run build"
  publish = "frontend/out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://your-render-app.onrender.com"

# Redirect API calls to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://your-render-app.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "start-frontend.bat"
  targetPort = 3000
  autoLaunch = false
