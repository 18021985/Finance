[build]
  command = "cd frontend && npm install --legacy-peer-deps && npm run build"
  publish = "frontend/out"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "start-frontend.bat"
  targetPort = 3000
  autoLaunch = false
